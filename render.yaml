services:
  - type: web
    runtime: node
    name: groweasy-csv-importer
    plan: free

    buildCommand: >-
      cd backend &&
      npm ci --include=dev &&
      npm run build &&
      cd ../frontend &&
      npm ci --include=dev &&
      npm run build

    startCommand: bash start.sh
    healthCheckPath: /

    envVars:
      - key: GROQ_API_KEY
        sync: false
