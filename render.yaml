services:
  - type: web
    runtime: node
    name: groweasy-csv-importer
    plan: free
    buildCommand: >-
      npm install --prefix backend &&
      npm run build --prefix backend &&
      npm install --prefix frontend &&
      npm run build --prefix frontend
    startCommand: bash start.sh
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Public port Render assigns to this service; the frontend binds here.
      - key: PORT
        value: 10000
      # Internal-only port used for the backend <-> frontend proxy.
      - key: BACKEND_INTERNAL_PORT
        value: 4000
      # Groq (OpenAI-compatible) settings for the backend AI extractor.
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_BATCH_SIZE
        value: 8
      - key: AI_BATCH_RETRIES
        value: 1
      - key: GROQ_API_KEY
        sync: false
