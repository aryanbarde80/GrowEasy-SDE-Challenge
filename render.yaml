services:
  - type: web
    runtime: node
    name: groweasy-csv-importer
    plan: free
    buildCommand: >-
      npm install --prefix backend &&
      npm run build --prefix backend &&
      npm install --prefix frontend &&
      npm run build --prefix frontend
    startCommand: bash start.sh
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # The only variable you actually need to set — Render will prompt
      # for it. Everything else (model, ports, batch size) has a working
      # default baked into the code; override here only if you need to.
      - key: GROQ_API_KEY
        sync: false
